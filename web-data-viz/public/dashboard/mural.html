<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckPoint | Catálogo</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body onload="validarSessao()" style="background-color: #161618;">

    <div class="janela">


        <div class="header-left">

            <h1>CheckPoint</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>


            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <h3>Gráficos</h3>
                </a>
            </div>

            <div class="btn-nav">
                <h3>Adicionar Jogo</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash-right">


            <div class="avisos">
                <div id="alerta">
                </div>
                <div class="container">
                    <h1>Adicionar jogo ao catálogo</h1>
                    <div class="div-form">
                        <form class="form-cadastro-jogo">
                            <label class="campo">
                                <span>Título</span>
                                <input id="titulo" name="titulo" maxlength="100" type="text"
                                    placeholder="Ex: Hollow Knight">
                            </label>

                            <label class="campo">
                                <span>Link da imagem do jogo</span>
                                <input id="foto" name="foto" type="url"
                                    placeholder="https://exemplo.com/capa-do-jogo.jpg">
                            </label>

                            <label class="campo">
                                <span>Descrição do jogo</span>
                                <textarea id="descricao" name="descricao" maxlength="250" rows="5"
                                    placeholder="Descreva o jogo, seu enredo, gênero ou principais características."></textarea>
                            </label>

                            <label class="campo">
                                <span>Review do usuário</span>
                                <textarea id="review" name="review" maxlength="250" rows="5"
                                    placeholder="Escreva sua opinião pessoal sobre o jogo."></textarea>
                            </label>

                            <div class="campo-duplo">
                                <label class="campo">
                                    <span>Nota</span>
                                    <select id="nota" name="nota">
                                        <option value="5">5 - Excelente</option>
                                        <option value="4">4 - Muito bom</option>
                                        <option value="3">3 - Bom</option>
                                        <option value="2">2 - Regular</option>
                                        <option value="1">1 - Ruim</option>
                                    </select>
                                </label>

                                <label class="campo">
                                    <span>Status</span>
                                    <select id="statusSelect" name="status">
                                        <option value="0">Wishlist</option>
                                        <option value="1">Jogando</option>
                                        <option value="2">Concluído</option>
                                    </select>
                                </label>
                            </div>

                            <button type="submit" onclick="publicar()">Adicionar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>




</body>

</html>

<script>

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;


    function publicar() {
        var idUsuario = sessionStorage.ID_USUARIO;

        var corpo = {
            usuario: idUsuario,
            titulo: titulo.value,
            foto: foto.value,
            descricao: descricao.value,
            review: review.value,
            nota: nota.value,
            status: statusSelect.value
        }

        fetch(`/jogo/publicar`, {
            method: "post",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(corpo)
        }).then(function (resposta) {

            console.log("resposta: ", resposta);

            if (resposta.ok) {
                window.alert("Jogo adicionado com sucesso pelo usuario de ID: " + idUsuario + "!");
                window.location = "/dashboard/mural.html";
            } else if (resposta.status == 404) {
                window.alert("Deu 404!");
            } else if (resposta.status == 409) {
                window.alert("Você já avaliou este jogo.");
            } else {
                throw ("Houve um erro ao tentar realizar a postagem! Código da resposta: " + resposta.status);
            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
            finalizarAguardar();
        });

        return false;

    }


</script>
