<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckPoint | Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<!-- <body onload=" atualizarFeed()"> -->

<body>

    <div class="janela">
        <div class="header-left">
            <h1>CheckPoint</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">

                <h3>Gráficos</h3>

            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Adicionar Jogo</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash">
            <div class="dash-titulo">Dashboard</div>
            <div class="kpi_container">
                <div class="kpi">
                    <span class="kpi-label">Jogos Adicionados</span>
                    <span class="kpi-numero"><span id="kpi_adicionados">42</span></span>
                </div>
                <div class="kpi">
                    <span class="kpi-label">Media de suas notas</span>
                    <span class="kpi-numero"><span id="kpi_media">18</span></span>
                </div>
                <div class="kpi">
                    <span class="kpi-label">Jogos Concluidos</span>
                    <span class="kpi-numero"><span id="kpi_concluidos">8</span></span>
                </div>
            </div>
            <div class="graficos_container">
                <div class="grafico">
                    <h2 class="grafico-titulo">Suas notas vs. média da comunidade</h2>
                    <canvas id="graficoBarra"></canvas>
                </div>
                <div class="grafico">
                    <h2 class="grafico-titulo">Status dos Jogos</h2>
                    <canvas id="graficoDonut"></canvas>
                </div>
            </div>
        </div>
    </div>


</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    idUsuario = sessionStorage.ID_USUARIO;
    plotarKpi();

    async function plotarKpi() {
        const resultado = await fetch(`/dashboard/kpi/${idUsuario}`)
        const stats = await resultado.json();
        kpi_adicionados.innerHTML = stats.adicionados
        kpi_media.innerHTML = stats.nota_media
        kpi_concluidos.innerHTML = stats.concluidos

    }

    async function graficoBarra() {
        const resultado = await fetch(`/dashboard/graficoBarra/${idUsuario}`)
        if (resultado.ok) {
            const dados = await resultado.json();
            plotarGraficoBarra(dados)
        }
    }

    function plotarGraficoBarra(dados) {

    const labels = dados.map(item => item.jogo);
    const notasUsuario = dados.map(item => item.notaUsuario);
    const mediasComunidade = dados.map(item => item.mediaComunidade);

    new Chart(document.getElementById('graficoBarra'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Sua nota', data: notasUsuario },
                { label: 'Média da comunidade', data: mediasComunidade }
            ]
        },
    options: {
        maintainAspectRatio: false
    }
    });
}

async function plotarGraficoDonut() {
    const resultado = await fetch(`/dashboard/graficoDonut/${idUsuario}`);
    const dados = await resultado.json();

    new Chart(document.getElementById('graficoDonut'), {
        type: 'pie',
        data: {
            labels: ['Wishlist', 'Jogando', 'Concluídos'],
            datasets: [{
                data: [dados.wishlist, dados.jogando, dados.concluidos]
            }]
        },
    options: {
        maintainAspectRatio: false
    }
    });
}
graficoBarra();
plotarGraficoDonut();
</script>
